name: Aspectran Assets Cache Warmup

on:
  schedule:
    # Run periodically every 3 hours
    - cron: '0 */3 * * *'
  workflow_dispatch: # Allow manual execution if needed

jobs:
  warmup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7

      - name: Run Dynamic Cache Warmup
        run: |
          # Define domains
          CUSTOM_DOMAIN="https://assets.aspectran.com"
          JSDELIVR_BASE="https://cdn.jsdelivr.net/gh/aspectran/aspectran-assets@main"
          
          # Find all css and js files under assets directory to optimize performance
          find assets -type f \( -name "*.css" -o -name "*.js" \) ! -path '*/.*' | while read -r file; do
            # Extract relative path from assets directory (e.g. js/theme-toggler.js)
            rel_path="${file#assets/}"
            
            # 1. Custom Domain URL (without version query parameters to avoid mismatch)
            url_custom="${CUSTOM_DOMAIN}/${rel_path}"
            echo "Warming up (Custom Domain): $url_custom"
            curl -I -s -o /dev/null -w "Status: %{http_code}\n" "$url_custom"
            
            # 2. jsDelivr URL (includes assets/ path)
            url_jsdelivr="${JSDELIVR_BASE}/${file}"
            echo "Warming up (jsDelivr): $url_jsdelivr"
            curl -I -s -o /dev/null -w "Status: %{http_code}\n" "$url_jsdelivr"
            
            echo "------------------------------------------------"
          done
